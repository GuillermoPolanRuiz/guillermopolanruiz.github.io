<!DOCTYPE html>
<html>
<head>
    <title>Calculadora</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #ff9800;
            color: #fff;
            padding: 20px;
            text-align: center;
            margin-bottom: 5%;
        }

        .container {
            margin-top: 50px;
            max-width: 300px;
            margin: 0 auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            padding: 20px;
            text-align: center;
        }

        #result {
            height: 60px;
            font-size: 28px;
            text-align: right;
            margin-bottom: 20px;
            width: 90%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .button {
            width: 50px;
            height: 50px;
            font-size: 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #eee;
            cursor: pointer;
        }

        .buttonDisable{
          width: 50px;
            height: 50px;
            font-size: 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #ffffff;
            cursor: pointer;
        }

        .button:hover {
            background-color: #ccc;
        }

        .button.operator {
            background-color: #ff9800;
            color: #fff;
        }

        .button.operator:hover {
            background-color: #f57c00;
        }
    </style>
</head>
<body>
    <header>
        <h1>Calculadora</h1>
    </header>
  <div class="container">
    <input type="text" id="result" readonly>
    <button class="buttonDisable" onclick="clearResult()"></button>
    <button class="button" onclick="clearResult()">C</button>
    <button class="button" onclick="deleteLastCharacter()">&larr;</button>
    <button class="button operator" onclick="appendCharacter('/')">/</button>
    <button class="button" onclick="appendCharacter('7')">7</button>
    <button class="button" onclick="appendCharacter('8')">8</button>
    <button class="button" onclick="appendCharacter('9')">9</button>
    <button class="button operator" onclick="appendCharacter('*')">*</button>
    <button class="button" onclick="appendCharacter('4')">4</button>
    <button class="button" onclick="appendCharacter('5')">5</button>
    <button class="button" onclick="appendCharacter('6')">6</button>
    <button class="button operator" onclick="appendCharacter('-')">-</button>
    <button class="button" onclick="appendCharacter('1')">1</button>
    <button class="button" onclick="appendCharacter('2')">2</button>
    <button class="button" onclick="appendCharacter('3')">3</button>
    <button class="button operator" onclick="appendCharacter('+')">+</button>
    <button class="button" onclick="appendCharacter('0')">0</button>
    <button class="button" onclick="appendCharacter('.')">.</button>
    <button class="button operator" onclick="calculateResult()">=</button>
  </div>

    <script>

      let result = document.getElementById('result');

      function appendCharacter(character) {
          result.value += character;
      }

      function clearResult() {
          result.value = '';
      }

      function deleteLastCharacter() {
          result.value = result.value.slice(0, -1);
      }

      function calculateResult() {
          try {
              let calculation = eval(result.value);
              result.value = calculation;
          } catch (error) {
              result.value = 'Error';
          }
      }


    </script>
</body>
</html>
