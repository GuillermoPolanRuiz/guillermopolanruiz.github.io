<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 20px;
        }

        header {
            background-color: #ff9800;
            color: #fff;
            padding: 20px;
            text-align: center;
            margin-bottom: 2%;
        }


        textarea {
            width: 100%;
            height: 100px;
            font-size: 85px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 5px;
            background-color: #ff9800;
            color: white;
            border: none;
            cursor: pointer;
        }

        #b {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
        }

        #b.error {
            color: red;
        }
    </style>
</head>
<body>
    <header>
        <h1>Adivinar DNI</h1>
    </header>
    <textarea name="a" id="a"></textarea>
    <button onclick="calcularLetraDNI()">Pulsa</button>
    <div id="b"></div>
    <script>
        function calcularLetraDNI() {
            var num = document.getElementById("a").value.toString();
            var letras = 'TRWAGMYFPDXBNJZSQVHLCKE';

            if (esError(num)) {
                var posicion = num % 23;
                var letra = letras.charAt(posicion);
                var dniResultDiv = document.getElementById("b");
                dniResultDiv.textContent = "La letra del DNI es: " + letra; 
                dniResultDiv.classList.remove("error");
            }

            
        }


        function esError(num) {
            if (num.length != 8) {
                colocarError("Error en la longitud");
                return false;
            }
            
            var regex = /^[0-9]+$/;  // Expresión regular para buscar letras en el string
            if (!regex.test(num)){
                colocarError("Error. Debe contener únicamente números");
                return false;
            }

            return true;
        }

        function colocarError(msg) {
            var dniResultDiv = document.getElementById("b");
            dniResultDiv.textContent = msg;
            dniResultDiv.classList.add("error");
        }
    </script>
</body>
</html>
