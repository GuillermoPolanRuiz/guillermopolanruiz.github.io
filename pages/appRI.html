<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar la Aplicación</title>
    <style>
        /* Reset de estilos para eliminar márgenes y rellenos predeterminados */
        body, h1, h2, p, a, table {
            margin: 0;
            padding: 0;
        }

        /* Estilos generales de la página */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f2f2f2;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #ff9800;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 32px;
        }

        main {
            margin: 20px;
        }

        /* Estilos para la sección de descarga */
        .download-section {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h2 {
            color: #ff9800;
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .download-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #ff9800;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            transition: background-color 0.3s;
        }

        .download-button:hover {
            background-color: #2980b9;
        }

        /* Estilos para la tabla de información */
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 80%;
            margin-top: 30px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #ff9800;
            color: #fff;
        }

        /* Estilos del pie de página */
        footer {
            background-color: #ff9800;
            padding: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Descargar la Aplicación Móvil</h1>
    </header>
    <main>
        <section class="download-section">
            <h2>¡Descarga la APP!</h2>
            <p>Pulsa click abajo</p>
            <p>↓</p>
            <a href="../download/AppRI_22102023.apk" class="download-button">Descargar Ahora</a>
            <table>
                <tr>
                    <th>Versión</th>
                    <td>1.1</td>
                </tr>
                <tr>
                    <th>Fecha</th>
                    <td>19 de Octubre de 2023</td>
                </tr>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Guillermo Polan Ruiz</p>
    </footer>
</body>
</html>
